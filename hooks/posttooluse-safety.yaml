# ---------------------------------------------------------------------------
# Demo 3-B: PostToolUse Hook — Block dangerous shell commands
# ---------------------------------------------------------------------------
# This command-type hook intercepts every Bash / ExecuteShellCommand tool call,
# inspects the command string, and blocks anything matching a dangerous pattern.
#
# Apply at: Builder → Hooks → Create hook
# ---------------------------------------------------------------------------

api_version: azuresre.ai/v2
kind: ExtendedAgent
metadata:
  name: demo_safety_hook
spec:
  instructions: |
    You are a helpful SRE assistant.
  enableVanillaMode: true

  hooks:
    PostToolUse:
      - type: command
        matcher: "Bash|ExecuteShellCommand"
        timeout: 30
        failMode: block
        script: |
          #!/usr/bin/env python3
          """
          Block dangerous shell commands before they execute.
          Patterns checked:
            - rm -rf
            - sudo
            - chmod 777
            - dd if=
            - mkfs
          """
          import sys, json, re

          context = json.load(sys.stdin)
          command = context.get('tool_input', {}).get('command', '')

          DANGEROUS_PATTERNS = [
              (r'\brm\s+-rf\b',    'rm -rf detected'),
              (r'\bsudo\b',        'sudo usage detected'),
              (r'\bchmod\s+777\b', 'chmod 777 detected'),
              (r'\bdd\s+if=',      'dd command detected'),
              (r'\bmkfs\b',        'mkfs command detected'),
          ]

          for pattern, label in DANGEROUS_PATTERNS:
              if re.search(pattern, command):
                  print(json.dumps({
                      "decision": "block",
                      "reason": f"Policy violation — {label}. Command: {command}"
                  }))
                  sys.exit(0)

          # No match — allow the command
          print(json.dumps({"decision": "allow"}))
