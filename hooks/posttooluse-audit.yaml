# ---------------------------------------------------------------------------
# Demo 3-C: PostToolUse Hook — Audit every tool call
# ---------------------------------------------------------------------------
# Logs every tool invocation and injects an audit trail message into the
# conversation so the agent (and humans reviewing) can see what ran.
# ---------------------------------------------------------------------------

api_version: azuresre.ai/v2
kind: ExtendedAgent
metadata:
  name: demo_audit_hook
spec:
  instructions: |
    You are a helpful SRE assistant.
  enableVanillaMode: true

  hooks:
    PostToolUse:
      - type: command
        matcher: "*"          # match ALL tools
        timeout: 30
        failMode: allow       # never block on audit failures
        script: |
          #!/usr/bin/env python3
          import sys, json, datetime

          context = json.load(sys.stdin)
          tool   = context.get('tool_name', 'unknown')
          ok     = context.get('tool_succeeded', False)
          ts     = datetime.datetime.utcnow().isoformat() + "Z"

          # Log to stderr (visible in sandbox logs, not parsed as decision)
          print(f"[AUDIT] {ts}  tool={tool}  success={ok}", file=sys.stderr)

          # Inject audit context into the conversation
          print(json.dumps({
              "decision": "allow",
              "hookSpecificOutput": {
                  "additionalContext": f"[AUDIT {ts}] Tool '{tool}' executed (success={ok})."
              }
          }))
