# ---------------------------------------------------------------------------
# Demo 3-A: Stop Hook — Quality gate that requires a completion marker
# ---------------------------------------------------------------------------
# This prompt-type hook rejects any agent response that does NOT end with
# "Task complete."  The agent is forced to continue and add the marker.
#
# Apply at: Builder → Hooks → Create hook  (agent-level)
#   OR       Agent Canvas → Custom agent → Manage Hooks  (custom-agent-level)
# ---------------------------------------------------------------------------

api_version: azuresre.ai/v2
kind: ExtendedAgent
metadata:
  name: demo_quality_gate
spec:
  instructions: |
    You are a helpful SRE assistant. Always finish your responses
    with "Task complete." on its own line.
  enableVanillaMode: true

  hooks:
    Stop:
      - type: prompt
        prompt: |
          Review the agent's final response.
          $ARGUMENTS
          Check whether the response ends with the exact phrase "Task complete."
          Respond with:
          - {"ok": true}   if the marker is present
          - {"ok": false, "reason": "Your response must end with 'Task complete.' — please add it and try again."} if not
        timeout: 30
        maxRejections: 3
